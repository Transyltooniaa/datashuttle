name: Build Sphinx docs and deploy to GitHub Pages

# Generate the documentation on all merges to main, all pull requests, or by
# manual workflow dispatch. The build job can be used as a CI check that the
# docs still build successfully. The deploy job only runs when a tag is pushed
# (so, when a new release is made).
on:
  push:
    branches:
      - main
      - '*'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  linting:
    # scheduled workflows should not run on forks
    if: (${{ github.event_name == 'schedule' }} && ${{ github.repository_owner == 'neuroinformatics-unit' }} && ${{ github.ref == 'refs/heads/main' }}) || (${{ github.event_name != 'schedule' }})
    runs-on: ubuntu-latest
    steps:
      - uses: neuroinformatics-unit/actions/lint@v2

  build_sphinx_docs:
    name: Build Sphinx Docs
    needs: linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Need the tags so that setuptools-scm can form a valid version number
      - name: Fetch git tags
        run: git fetch origin 'refs/tags/*:refs/tags/*'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Upgrade pip
        shell: bash
        run: |
          # install pip>=20.1 to use "pip cache dir"
          python3 -m pip install --upgrade pip

      - name: Get pip cache dir
        shell: bash
        id: pip-cache
        run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        shell: bash
        run: python3 -m pip install -r ./docs/requirements.txt

      - name: Check links
        shell: bash
        run: |
            sphinx-build docs/source docs/build -b linkcheck

      - name: Building documentation
        shell: bash
        run: |
            sphinx-build docs/source docs/build -b html --keep-going

      - name: Upload the content for deployment
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.sha }}
          path: ./docs/build/

  deploy_sphinx_docs:
    name: Deploy Sphinx Docs
    needs: build_sphinx_docs
    permissions:
      contents: write
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fetch the built docs from the "build_sphinx_docs" job
      - name: Download HTML documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-${{ github.sha }}
          path: docs/build

      - name: Checkout the gh-pages branch in a separate folder
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          # Checkout to this folder instead of the current one
          path: deploy
          # Download the entire history
          fetch-depth: 0

      - name: Push the built HTML to gh-pages
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref type: ${{ github.ref_type }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
              # Extract the tag name as the version
              version="${GITHUB_REF#refs/*/}"
          else
              version=dev
          fi
          echo "Deploying version: $version"
          # Create a commit message before changing directories
          message="Deploy $version from $(git rev-parse --short HEAD)"
          cd deploy
          # Prevent GitHub Pages from applying Jekyll processing
          touch .nojekyll
          echo -e "\nRemoving old files from previous builds of ${version}:"
          rm -rvf ${version}
          echo -e "\nCopying HTML files to ${version}:"
          cp -Rvf ../docs/build ${version}/

          # Only update switcher.json and the latest folder for tagged releases
          if [[ "${version}" != "dev" ]]; then
            # Attempt to read the existing switcher.json from the deployed latest docs
            if [ -f "latest/_static/switcher.json" ]; then
                SWITCHER_CONTENT=$(cat latest/_static/switcher.json)
            else
                SWITCHER_CONTENT='[]'
            fi
            # Extract the BASE_URL from the first entry if possible
            BASE_URL=$(echo "$SWITCHER_CONTENT" | jq -r '.[0].url | split("/")[0:3] | join("/")')
            if [[ -z "$BASE_URL" || "$BASE_URL" == "null" ]]; then
              BASE_URL="https://transyltooniaa.github.io/datashuttle"
            fi
            NEW_URL="${BASE_URL}/${version}/"
            # Create the new version entry
            NEW_ENTRY=$(jq -n --arg version "${version}" --arg url "${NEW_URL}" \
              '{"version": $version, "url": $url}')
            # Append the new entry, ensure uniqueness, and sort entries (reverse order)
            UPDATED_SWITCHER_CONTENT=$(jq --argjson new_entry "$NEW_ENTRY" '
              . + [$new_entry] | unique_by(.version) | sort_by(.version) | reverse
            ' <<< "$SWITCHER_CONTENT")
            # Make sure the _static directory exists in the new version
            mkdir -p "${version}/_static"
            # Write the updated switcher content to the new version's _static directory
            echo "$UPDATED_SWITCHER_CONTENT" > "${version}/_static/switcher.json"
            echo "Updated ${version}/_static/switcher.json:"
            cat "${version}/_static/switcher.json"
          fi

          # For tagged releases, update the "latest" directory with the new version
          if [[ "${version}" != "dev" ]]; then
              echo -e "\nUpdating latest directory to ${version}."
              rm -rf latest
              cp -R ${version} latest
          fi
          # Stage, commit, and push changes to gh-pages
          git add -A .
          echo -e "\nChanges to be applied:"
          git status
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          echo -e "\nCommitting changes:"
          git commit -m "$message" || echo "No changes to commit."
          echo -e "\nPushing changes to gh-pages."
          git push origin gh-pages
          echo -e "\nFinished uploading generated files."
